[config]
reload_apps = true

[config.reload_apps_list]
kitty = true
gtk_theme = true

[config.wallpaper]
command = "awww img -t fade --transition-duration 0.5 --transition-step 255 --transition-fps 60 -f Nearest {{image}}"
set = true

[templates.hyprland]
input_path = "~/.config/matugen/templates/colors-hyprland.lua"
output_path = "~/.config/hypr/source/colors.lua"

[templates.kitty]
input_path = "~/.config/matugen/templates/colors-kitty.conf"
output_path = "~/.config/kitty/colors.conf"
post_hook = "killall -SIGUSR1 kitty >/dev/null 2>&1"

[templates.opencode]
input_path = "~/.config/matugen/templates/colors-opencode.json"
output_path = "~/.config/opencode/themes/matucode.json"
pre_hook = "if [ ! -d ~/.config/opencode/themes ]; then mkdir ~/.config/opencode/themes; fi"

[templates.gtk3]
input_path = "~/.config/matugen/templates/colors-gtk.css"
output_path = "~/.config/gtk-3.0/gtk.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/colors-gtk.css"
output_path = "~/.config/gtk-4.0/gtk.css"

[templates.qt5ct]
input_path = "~/.config/matugen/templates/colors-qt.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.qt6ct]
input_path = "~/.config/matugen/templates/colors-qt.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.nvimdarkcache]
input_path = "~/.config/matugen/templates/colors-base46.lua"
output_path = "~/.cache/wal/base46-dark.lua"

[templates.nvimlightcache]
input_path = "~/.config/matugen/templates/colors-base46.lua"
output_path = "~/.cache/wal/base46-light.lua"

[templates.pywal]
input_path = "~/.config/matugen/templates/colors-pywal"
output_path = "~/.cache/wal/colors"

[templates.pywaljson]
input_path = "~/.config/matugen/templates/colors-pywal.json"
output_path = "~/.cache/wal/colors.json"
# post_hook = "pywalfox update &"  # TODO: pywalfox not on nixpkgs; re-add when packaged

[templates.pywalsh]
input_path = "~/.config/matugen/templates/colors.sh"
output_path = "~/.cache/wal/colors.sh"

[templates.pywalwalfile]
input_path = "~/.config/matugen/templates/wal"
output_path = "~/.cache/wal/wal"

[templates.zathura]
input_path = "~/.config/matugen/templates/colors-zathura"
output_path = "~/.config/zathura/zathurarc"

[templates.cava]
input_path = "~/.config/matugen/templates/colors-cava"
output_path = "~/.config/cava/config"
post_hook = "killall -SIGUSR1 cava >/dev/null 2>&1"

[templates.rofi]
input_path = "~/.config/matugen/templates/colors-rofi.rasi"
output_path = "~/.config/rofi/shared/colors.rasi"

[templates.swaync]
input_path = "~/.config/matugen/templates/colors-swaync.css"
output_path = "~/.config/swaync/styles/colors.css"
post_hook = "swaync-client -rs >/dev/null 2>&1"

# TODO(Phase 2): Telegram theming via walogram. walogram is not on nixpkgs and
# needs a local derivation (see MIGRATION.md §"Local-derivation candidates"), and
# its output path below wrote into /usr/share (no FHS on NixOS). Re-enable once
# the walogram derivation lands in packages/ and a user-writable output path is
# wired up.
# [templates.telegram]
# input_path = "~/.config/matugen/templates/colors-telegram.tdesktop-theme"
# output_path = "~/.local/share/walogram/constants.tdesktop-theme"
# post_hook = "walogram -Bc >/dev/null 2>&1 && pkill Telegram; hyprctl eval 'hl.exec_cmd(\"[workspace special silent] Telegram\")'"

[config.custom_colors.red]
color = "#FF0000"
blend = true

[config.custom_colors.green]
color = "#00FF00"
blend = true

[config.custom_colors.yellow]
color = "#FFFF00"
blend = true

[config.custom_colors.blue]
color = "#0000FF"
blend = true

[config.custom_colors.magenta]
color = "#FF00FF"
blend = true

[config.custom_colors.cyan]
color = "#00FFFF"
blend = true

[config.custom_colors.white]
color = "#FFFFFF"
blend = true
