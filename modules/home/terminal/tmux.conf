set-option -g default-terminal 'xterm-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'
set-option -g status-position top
set-option -g status-format[1] " "
set-option -g status 2
set-option -g mouse on

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

bind-key x kill-pane # skip the "kill-pane 1? (y/n)" prompt
set-option -g detach-on-destroy off

bind-key -n M-H previous-window
bind-key -n M-L next-window

set-option -g base-index 1
set-option -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi

# floax options (the plugin itself is loaded by Home Manager, not TPM)
set-option -g @floax-text-color 'default'
set-option -g @floax-bind '-n M-f'

# Theme: borders
set-option -g pane-border-lines single
set-option -g pane-border-style fg=colour8
set-option -g pane-active-border-style fg=colour16

# Theme: status
set-option -g status-style bg=default,fg=brightblack
set-option -g @round-separator-style-prefix fg=colour1,bg=colour19
set-option -g @round-separator-style fg=colour16,bg=colour19
set-option -g @left-text-style-prefix fg=colour8,bg=colour1
set-option -g @left-text-style fg=colour8,bg=colour16
set-option -g status-left "#[#{?client_prefix,#{@round-separator-style-prefix},#{@round-separator-style}}]#[#{?client_prefix,#{@left-text-style-prefix},#{@left-text-style}}]󰣇 #S#[#{?client_prefix,#{@round-separator-style-prefix},#{@round-separator-style}}]#[bg=colour19]  "
set-option -g status-left-length "30"
set-option -g status-right "#[fg=colour18]%H:%M  "

# Theme: status (windows)
set-option -g window-status-format "#{window_name}"
set-option -g window-status-current-format "#[fg=colour16]#{?window_zoomed_flag,*}#{window_name}"
set-option -g window-status-current-style "fg=colour16"
set-option -g window-status-bell-style "fg=red,nobold"
set-option -g status-justify left

set-option -s extended-keys on
set-option -as terminal-features 'xterm-kitty:extkeys'

# Direct resize without prefix
bind-key -n C-H resize-pane -L 5
bind-key -n C-J resize-pane -D 2
bind-key -n C-K resize-pane -U 2
bind-key -n C-L resize-pane -R 5

bind-key -n C-y copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-seleciton
bind-key -T copy-mode-vi Escape send-keys -X cancel

bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"

# Popup styling
set-option -g popup-border-style fg=brightblack
set-option -g popup-border-lines rounded

bind-key -n M-s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind-key -n M-l run-shell "sesh last"

bind-key -n M-g popup -d '#{pane_current_path}' -w80% -h80% -E 'lazygit'
